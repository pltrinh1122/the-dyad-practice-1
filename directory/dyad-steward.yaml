  - "commons process-integrity — guaranteeing nothing enters the shared library except by a survived falsification, and that what the dyad asserts about the Commons is what is, not what was remembered. Realized: stood up the cross-dyad falsification channel — a contract stress-tested from v1 to v4 by a real cross-model panel that refuted two of its own invariants before it shipped (live at falsification/)."
  - "knowledge compounding — making each dyad's surviving lessons accumulate across sessions and practitioners without decaying. Realized: crystallized the Proposal-Framing playbook from a lived evidence ledger and contributed it to the shared library as a reusable routine (library/proposal-framing/)."
  - "accelerating the multi-dyad Operator to portfolio-scale 1+1=3 — making one Operator's surviving lessons compound safely across their whole fleet (integrity is the brake that lets the portfolio go fast; compounding is the engine), so one human keeps more dyads' loops positive — raise N*, the most dyads whose loop stays positive under one human's steering — without their steering bandwidth becoming the cap. The Operator's own growth is the engine, never a bottleneck to route around. Aspirational; load-bearing premise (Operator-growth drives the acceleration) held observed-not-established, deferred to the first plateau."
